name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ windows-latest, ubuntu-latest, macos-latest ]

    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Smoke test (Unix)
        if: runner.os != 'Windows'
        run: |
          ./build/intv2convert --help 2>&1 | grep -q "intv2convert" || \
          ./build/intv2convert 2>&1 | grep -q "intv2convert"

      - name: Smoke test (Windows)
        if: runner.os == 'Windows'
        shell: cmd
        # cmd pipe exit code = last command (findstr), not the binary's exit 1.
        run: build\Release\intv2convert.exe 2>&1 | findstr "intv2convert"

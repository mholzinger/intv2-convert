name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ windows-latest, ubuntu-latest, macos-latest ]

    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Smoke test (Unix)
        if: runner.os != 'Windows'
        run: |
          ./build/intv2convert --help 2>&1 | grep -q "intv2convert" || \
          ./build/intv2convert 2>&1 | grep -q "intv2convert"

      - name: Smoke test (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          # Disable PowerShell 7.3+ behaviour that turns non-zero native exit
          # codes into terminating errors — our binary exits 1 for "no args".
          $PSNativeCommandUseErrorActionPreference = $false
          $out = & build\Release\intv2convert.exe 2>&1
          if (-not ($out -match "intv2convert")) { exit 1 }
